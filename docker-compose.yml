version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    ports:
      - "80:443"     # HTTPS webhook Platega (после setup_webhook.sh)
      - "8080:8080"  # HTTP fallback (если сертификата нет)
    volumes:
      - .:/app
      - /etc/letsencrypt:/etc/letsencrypt:ro  # сертификаты read-only
    command: >
      sh -c "
        cd /app &&
        alembic -c migrations/alembic.ini upgrade head &&
        python main.py
      "

volumes:
  postgres_data:
